<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lock Screen</title>
  <link rel="stylesheet" href="boxer-surprise.css" />
</head>
<body>
  <div class="lights" aria-hidden="true"></div>

  <main class="lock-wrap">
    <section class="lock-card">
      <div class="left-visual">
        <img class="couple-img" src="144boxer.jpg/2 boxer .photo.png" alt="Boxer couple" />
      </div>

      <div class="right-panel">
        <div class="brand">
          <h1>Boxer Birthday</h1>
          <p>Enter the PIN to reveal the surprise…</p>
        </div>

        <div class="glass-login">
          <div class="pin-label">
            <strong>PIN</strong>
            <span class="hint">Try: 1062007</span>
          </div>

          <input id="pin-display" class="pin-display" type="text" readonly placeholder="ENTER PIN" maxlength="7" />

          <div class="keypad" role="group" aria-label="Numeric keypad">
            <button type="button" onclick="addNumber(1)">1</button>
            <button type="button" onclick="addNumber(2)">2</button>
            <button type="button" onclick="addNumber(3)">3</button>
            <button type="button" onclick="addNumber(4)">4</button>
            <button type="button" onclick="addNumber(5)">5</button>
            <button type="button" onclick="addNumber(6)">6</button>
            <button type="button" onclick="addNumber(7)">7</button>
            <button type="button" onclick="addNumber(8)">8</button>
            <button type="button" onclick="addNumber(9)">9</button>
            <button type="button" class="btn-clear" onclick="clearPin()">Clear</button>
            <button type="button" onclick="addNumber(0)">0</button>
            <button type="button" onclick="checkPin()">Enter</button>
          </div>

          <div id="error-toast" class="error-toast" role="status" aria-live="polite"></div>

          <div class="enter-row">
            <button class="enter-btn" type="button" onclick="checkPin()">Unlock ✨</button>
          </div>
        </div>
      </div>

      <div id="unlock-layer" class="unlock-layer" aria-hidden="true">
        <div class="shine">
          <h2>Unlocking your surprise…</h2>
          <div class="bar"><span></span></div>
        </div>
      </div>
    </section>
  </main>

  <script src="boxer-surprise.js" defer></script>
</body>
</html>
