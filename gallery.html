<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beautiful Memories Together ❤️</title>
  <link rel="stylesheet" href="boxer-surprise.css" />
  <link rel="stylesheet" href="gallery.css" />
</head>
<body>
  <div class="lights" aria-hidden="true"></div>

  <canvas id="particles" class="particles" aria-hidden="true"></canvas>
  <div id="float-hearts" class="float-hearts" aria-hidden="true"></div>

  <main class="gallery-page" role="main">
    <header class="gallery-hero" aria-label="Memories gallery header">
      <div class="gallery-hero-inner">
        <div class="ig-badge" aria-hidden="true">♡ Memory Album • Friendship & Birthday</div>
        <h1 class="gallery-title">Beautiful Memories Together ❤️</h1>
        <p class="gallery-sub">Every photo tells a story, every memory lasts forever ✨</p>

        <div class="gallery-meta" aria-live="polite">
          <span class="counter"><strong id="photoCounter">0</strong> memories</span>
          <span class="dot">•</span>
          <span class="hint">Tap any photo to open</span>
        </div>

        <div class="gallery-actions" aria-label="Gallery actions">
          <a class="restart-link gallery-back" href="friendship.html" aria-label="Back to friendship page">
            Back to Friendship ✨
          </a>
          <a class="memory-video-btn" href="videos.html" aria-label="Watch Our Memories">
            Watch Our Memories 🎥
          </a>
        </div>
      </div>
    </header>

    <section class="masonry" aria-label="Memories photo grid">
      <!-- Hero image -->
      <div class="tile tile-hero reveal" data-index="1">
        <img class="reel-img" src="200boxer.jpg.jpeg" alt="Memory photo 1" loading="lazy" />
        <div class="tile-overlay glass-overlay" aria-hidden="true"></div>
      </div>

      <!-- Instagram style tiles (sizes vary via CSS) -->
      <button class="tile tile-small reveal" data-photo="144boxer.jpg/102boxer.jpg.jpeg" aria-label="Open memory photo 1">

    <!-- Lightbox -->
    <div class="lightbox" aria-hidden="true" role="dialog" aria-label="Photo lightbox">
      <div class="lightbox-backdrop" data-close="true"></div>
      <div class="lightbox-panel">
        <div class="lightbox-toolbar">
          <span class="lightbox-label">Memory Viewer</span>
          <button class="lightbox-close" type="button" aria-label="Close lightbox" data-close="true">✕</button>
        </div>
        <img class="lightbox-img" src="" alt="Opened memory" />
      </div>

  <script src="boxer-surprise.js" defer></script>
